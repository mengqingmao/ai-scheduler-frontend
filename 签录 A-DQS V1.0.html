<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签录 A-DQS V1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #eef2f6;
            color: #2f3a4a;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #f9fbfd;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e4ecf5;
        }

        h1 {
            color: #1f2a37;
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        .date-selector {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-left: auto;
            justify-content: flex-end;
        }

        #archiveBtn {
            margin-left: auto;
        }

        select, button {
            padding: 8px 14px;
            border: 1px solid #d8e2f0;
            border-radius: 10px;
            font-size: 14px;
            background: #ffffff;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
        }

        button {
            background: linear-gradient(135deg, #6aa9ff, #5b8dff);
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 18px rgba(72, 122, 255, 0.25);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(72, 122, 255, 0.32);
        }

        .main-content {
            display: flex;
            gap: 20px;
            align-items: stretch;
            min-height: calc(100vh - 220px);
        }

        .personnel-list {
            width: 130px; /* 从200px减少到130px */
            background-color: #ffffff;
            border-radius: 24px;
            padding: 16px;
            height: 100%;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        .personnel-list h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .personnel-item {
            min-height: 40px; /* 确保高度一致 */
            padding: 6px; /* 确保内边距一致 */
            background-color: #edf3ff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px; /* 确保字体大小一致 */
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
            box-shadow: inset 0 0 0 1px rgba(123, 156, 255, 0.2);
        }

        .schedule-cell.person-name {
            min-height: 38.9px; /* 确保高度一致 */
            padding: 5px; /* 确保内边距一致 */
            background-color: #edf3ff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px; /* 确保字体大小一致 */
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 10px;
        }
        .personnel-item:hover {
            background-color: #e3f2fd;
        }

        .personnel-item.active {
            background-color: #cfe0ff;
            font-weight: bold;
            box-shadow: 0 6px 14px rgba(92, 129, 255, 0.25);
        }

        .schedule-area {
            flex: 1;
            overflow-x: auto;
            margin-top: 60px; /* 将排班表模块整体下移 60 像素 */
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .schedule-header, .schedule-body {
            display: grid;
            grid-template-columns: 65px repeat(31, 1fr); /* 从120px减少到65px */
            gap: 1px;
            margin-bottom: 1px;
        }

        .schedule-header div {
            background-color: #4c5f7a;
            color: white;
            text-align: center;
            padding: 8px 4px;
            font-size: 12px;
            border-radius: 8px;
        }

        .schedule-body {
            display: grid;
            grid-template-columns: 60px repeat(31, 1fr); /* 从120px减少到60px */
            gap: 1px;
            margin-bottom: 1px;
            /*min-height: 30vh; /* 确保表格至少有一个视口高度 */
            overflow-y: auto; /* 如果内容超出高度，允许滚动 */
        }

        .schedule-cell {
            min-height: 35px;
            padding: 2px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
        }

        .schedule-cell:hover {
            filter: brightness(0.95);
        }

        .person-name {
            background-color: #e3f2fd;
            padding: 0px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    /* 班次颜色定义（背景 + 可读前景色） */
    .B11 { background-color: #FF0000; color: #ffffff; }
    .B12 { background-color: #FF6600; color: #000000; }
    .B13 { background-color: #7CF93F; color: #000000; }
    .B16 { background-color: #CC99FF; color: #000000; }
    .B18 { background-color: #0070C0; color: #ffffff; }
    .主班 { background-color: #FA26ED; color: #ffffff; }
    .监控 { background-color: #00CCFF; color: #000000; }
    .支持 { background-color: #008000; color: #ffffff; }
    .大夜一 { background-color: #FFFF00; color: #000000; }
    .大夜二 { background-color: #24BE7B; color: #000000; }

        /* 特殊班次颜色定义 */
        .年假 { background-color: #FF7B7B; }
        .复训 { background-color: #FF99CC; color: white; }
    .婚假 { background-color: #F472B6; color: white; }
    .育儿 { background-color: #60A5FA; color: white; }
        .D模 { background-color: #FF99CC; }
        .航实 { background-color: #7E62A1; color: white; }
        .情报 { background-color: #FFC000;  }
        .培训, .行政, .出差 { background-color: #7030A0;color: white; }
        .休息 { background-color: #8d6e63; color: white; }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .edit-mode {
            background-color: #ffeaa7;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }

        .qualification-panel {
            width: 250px;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        .qualification-panel h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .qualification-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .qualification-tag {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 20px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
        }

        .modal h3 {
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .shift-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .shift-option {
            padding: 8px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
        }
        .drag-over {
            outline: 2px dashed #3498db;
            background-color: #e8f4ff !important;
        }
        /* 选中单元格高亮样式 */
        .highlight-top {
            background-color: #ff9800 !important;
            color: white !important;
        }
        .highlight-left {
            background-color: #ff9800 !important;
            color: white !important;
        }
        .selected-cell {
            box-shadow: inset 0 0 0 2px rgba(255,152,0,0.6);
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            grid-auto-rows: 1fr;
            gap: 16px;
            padding: 16px;
            width: 100%;
            height: 100%;
            min-height: 0;
            align-content: stretch;
            flex: 1 1 auto;
        }

        .archive-tile {
            position: relative;
            background: #f1f5f9;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            aspect-ratio: 1 / 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .archive-thumb {
            position: absolute;
            inset: 0;
            background: #f1f5f9;
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 0.2s ease;
        }

        .archive-tile.has-archive .archive-thumb {
            opacity: 0.3;
        }

        .archive-tile-label {
            position: relative;
            z-index: 1;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: #2c3e50;
            letter-spacing: 1px;
        }

        .archive-tile:hover {
            animation: archive-bounce 0.4s ease;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        @keyframes archive-bounce {
            0% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
            60% { transform: translateY(2px); }
            100% { transform: translateY(0); }
        }

        .archive-home-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin: 8px 0 12px;
            width: 100%;
        }

        .archive-home-actions-right {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .archive-home-actions-right button {
            flex: 1;
        }

        .deduction-rules-btn {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            box-shadow: 0 10px 18px rgba(249, 115, 22, 0.28);
        }

        .archive-actions {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: flex-start;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .archive-actions-right {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-left: auto;
        }

        .archive-recent {
            margin-top: 0;
            background: #f8fafc;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
        }

        .archive-recent h4 {
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 13px;
        }

        .archive-recent-item {
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>签录 A-DQS V1.0<span class="edit-mode" id="editModeIndicator">查看模式</span></h1>
        <div class="date-selector">
            <select id="yearSelect">
                <!-- 年份选项由JavaScript动态生成 -->
            </select>
            <select id="monthSelect">
                <option value="1">1月</option>
                <option value="2">2月</option>
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="5">5月</option>
                <option value="6">6月</option>
                <option value="7">7月</option>
                <option value="8">8月</option>
                <option value="9">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
            </select>
            <select id="daySelect">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <option value="21">21</option>
                <option value="22">22</option>
                <option value="23">23</option>
                <option value="24">24</option>
                <option value="25">25</option>
                <option value="26">26</option>
                <option value="27">27</option>
                <option value="28">28</option>
                <option value="29">29</option>
                <option value="30">30</option>
                <option value="31">31</option>
            </select>
            <button id="generateBtn">一键排班</button>
            <button id="exportBtn">导出Excel</button>
            <button id="editBtn">编辑模式</button>
            <button id="archiveBtn">签档一录</button>
        </div>
    </header>

    <div class="main-content">
        <div class="personnel-list">
            <h3>人员列表</h3>
            <select id="teamSelect">
                <option value="神鹰">神鹰</option>
                <option value="CAVOK">CAVOK</option>
                <option value="天行者">天行者</option>
                <option value="签动未来">签动未来</option>
            </select>
            <div id="personnelList">
                <!-- 人员列表由JavaScript动态生成 -->
            </div>
        </div>

        <div class="schedule-area">
            <div class="schedule-header" id="scheduleHeader">
                <!-- 表头由JavaScript动态生成 -->
            </div>
            <div class="schedule-body" id="scheduleBody">
                <!-- 排班表内容由JavaScript动态生成 -->
            </div>
            <div class="archive-grid" id="archiveGrid" style="display:none"></div>
            <div class="archive-home-actions" id="archiveHomeActions" style="display:none">
                <button id="archiveBackBtn">返回排班界面</button>
                <div class="archive-home-actions-right">
                    <button id="annualStatsBtn">年度排班统计</button>
                    <button id="annualVacationBtn">年度休假记录</button>
                    <button id="annualTriplePayBtn">三倍工资记录</button>
                    <button id="deductionRulesBtn" class="deduction-rules-btn">减班计算规则</button>
                </div>
            </div>
            <div class="archive-actions" id="archiveActions" style="display:none">
                <button id="archiveHomeBtn">返回首页</button>
                <button id="archiveImportBtn">导入EXCEL</button>
                <button id="archiveSaveBtn">完成归档</button>
                <div class="archive-actions-right" id="archiveActionsRight">
                    <button id="archiveClearBtn">清空归档</button>
                    <div class="archive-recent" id="archiveRecent" style="display:none">
                        <h4>最近归档</h4>
                        <div id="archiveRecentList"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="qualification-panel">
            <h3>人员资质</h3>
            <div id="qualificationDisplay">
                <p>选择人员查看资质</p>
            </div>
            <h3 style="margin-top: 20px;">特殊班次设置</h3>
            <div class="shift-options">
                <div class="shift-option 年假" data-shift="年假">年假</div>
                <div class="shift-option 复训" data-shift="复训">复训</div>
                <div class="shift-option 航实" data-shift="航实">航实</div>
                <div class="shift-option D模" data-shift="D模">D模</div>
                <div class="shift-option 情报" data-shift="情报">情报</div>
                <div class="shift-option 婚假" data-shift="婚假">婚假</div>
                <div class="shift-option 育儿" data-shift="育儿">育儿</div>
                <div class="shift-option 培训" data-shift="培训">培训</div>
                <div class="shift-option 行政" data-shift="行政">行政</div>
                <div class="shift-option 出差" data-shift="出差">出差</div>
                <div class="shift-option 休息" data-shift="休息">休息</div>
                <div class="shift-option 空班" data-shift="空班">空班</div>
                <div class="shift-option" data-shift="" style="background-color: #f8f9fa;">清除</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="importBtn">导入EXCEL</button>
        <button id="saveBtn">保存排班</button>
        <button id="resetBtn">重置排班</button>
    </div>
    <input type="file" id="importFile" accept=".xls,.xlsx" style="display:none" />
</div>

<!-- 编辑单元格的模态框 -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>编辑班次</h3>
        <p id="modalInfo">为 <span id="modalPerson"></span> 的 <span id="modalDate"></span> 设置班次</p>
        <div class="shift-options">
            <div class="shift-option 年假" data-shift="年假">年假</div>
            <div class="shift-option 复训" data-shift="复训">复训</div>
            <div class="shift-option 情报" data-shift="情报">情报</div>
            <div class="shift-option 航实" data-shift="航实">航实</div>
            <div class="shift-option D模" data-shift="D模">D模</div>
            <div class="shift-option 婚假" data-shift="婚假">婚假</div>
            <div class="shift-option 育儿" data-shift="育儿">育儿</div>
            <div class="shift-option 培训" data-shift="培训">培训</div>
            <div class="shift-option 行政" data-shift="行政">行政</div>
            <div class="shift-option 出差" data-shift="出差">出差</div>
            <div class="shift-option 休息" data-shift="休息">休息</div>
            <div class="shift-option 空班" data-shift="空班">空班</div>
            <div class="shift-option" data-shift="" style="background-color: #f8f9fa;">清除</div>
        </div>
        <div class="modal-actions">
            <button id="modalCancel">取消</button>
            <button id="modalConfirm">确认</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="DQS1.js"></script>
</body>
</html>
